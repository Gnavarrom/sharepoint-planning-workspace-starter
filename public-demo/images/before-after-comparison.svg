<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F8F5"/>
      <stop offset="1" stop-color="#ECE7DB"/>
    </linearGradient>
    <filter id="shadowSoft" x="0" y="0" width="1600" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="16"/>
      <feGaussianBlur stdDeviation="18"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.14902 0 0 0 0 0.203922 0 0 0 0 0.180392 0 0 0 0.16 0"/>
      <feBlend mode="normal" in2="BackgroundImageFix" result="effect1_dropShadow_1_1"/>
      <feBlend mode="normal" in="SourceGraphic" in2="effect1_dropShadow_1_1" result="shape"/>
    </filter>
    <linearGradient id="arrowGrad" x1="705" y1="455" x2="895" y2="455" gradientUnits="userSpaceOnUse">
      <stop stop-color="#178468"/>
      <stop offset="1" stop-color="#0F614F"/>
    </linearGradient>
  </defs>

